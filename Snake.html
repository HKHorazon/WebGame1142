<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Pixel Snake</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0a0a0f;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

#gameWrapper{
    width:min(100vw, 500px);
    height:100vh;
    max-height:950px;
    background:linear-gradient(#101020,#06060d);
    position:relative;
    overflow:hidden;
}

canvas{
    background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        #0d0d18;
    background-size:24px 24px;
    display:block;
    margin:auto;
    image-rendering: pixelated;
    border-bottom:2px solid #00ffd5;
}

#topUI{
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
    color:#00ffd5;
    text-shadow:0 0 8px #00ffd5;
}

#controls{
    position:absolute;
    bottom:18px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.dpad{
    position:relative;
    width:220px;
    height:220px;
}

.btn{
    position:absolute;
    width:70px;
    height:70px;
    border:none;
    border-radius:18px;
    background:#1b1b2f;
    color:white;
    font-size:28px;
    box-shadow:
        0 0 10px #00ffd5,
        inset 0 0 12px rgba(0,255,213,0.4);
}

.btn:active{
    transform:scale(0.92);
}

#up{ left:75px; top:0; }
#down{ left:75px; bottom:0; }
#left{ left:0; top:75px; }
#right{ right:0; top:75px; }

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:10;
    padding:30px;
}

.overlay h1{
    font-size:42px;
    color:#00ffd5;
    text-shadow:0 0 12px #00ffd5;
    margin-bottom:20px;
}

.overlay p{
    opacity:0.9;
    margin-bottom:18px;
    line-height:1.6;
}

.mainBtn{
    border:none;
    padding:16px 28px;
    border-radius:16px;
    background:#00ffd5;
    color:#001010;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.flash{
    animation:flash 0.2s;
}

@keyframes flash{
    0%{ filter:brightness(2); }
    100%{ filter:brightness(1); }
}
</style>
</head>
<body>

<div id="gameWrapper">

    <div id="topUI">
        <div>分數：<span id="score">0</span></div>
        <div>最高：<span id="best">0</span></div>
    </div>

    <canvas id="game" width="480" height="720"></canvas>

    <div id="controls">
        <div class="dpad">
            <button class="btn" id="up">▲</button>
            <button class="btn" id="down">▼</button>
            <button class="btn" id="left">◀</button>
            <button class="btn" id="right">▶</button>
        </div>
    </div>

    <div class="overlay" id="startScreen">
        <h1>PIXEL SNAKE</h1>
        <p>
            手機：按方向鍵操作<br>
            電腦：WASD / 方向鍵<br><br>
            吃果實變長<br>
            撞牆、撞自己、撞障礙物會失敗<br><br>
            長度達到 22 即勝利！
        </p>
        <button class="mainBtn" onclick="startGame()">開始遊戲</button>
    </div>

    <div class="overlay" id="endScreen" style="display:none;">
        <h1 id="endTitle">GAME OVER</h1>
        <p id="endText"></p>
        <button class="mainBtn" onclick="restartGame()">重新開始</button>
    </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 24;
const tile = 20;

let snake;
let dir;
let nextDir;
let food;
let boostFood;
let obstacles;
let score;
let best;
let gameLoop;
let speed;
let running=false;

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

best = Number(localStorage.getItem("snake_best") || 0);
bestEl.textContent = best;

function randomCell(){
    return {
        x: Math.floor(Math.random() * tile),
        y: Math.floor(Math.random() * 28)
    };
}

function createFood(){
    food = randomCell();
}

function createBoostFood(){
    boostFood = randomCell();
}

function createObstacles(){
    obstacles=[];
    for(let i=0;i<6;i++){
        obstacles.push(randomCell());
    }
}

function resetGame(){

    snake = [
        {x:10,y:10},
        {x:9,y:10},
        {x:8,y:10}
    ];

    dir = {x:1,y:0};
    nextDir = dir;

    score=0;
    speed=150;

    createFood();
    createBoostFood();
    createObstacles();

    scoreEl.textContent=score;
}

function startGame(){

    document.getElementById("startScreen").style.display="none";
    document.getElementById("endScreen").style.display="none";

    resetGame();

    running=true;

    clearInterval(gameLoop);
    gameLoop=setInterval(update, speed);
}

function restartGame(){
    startGame();
}

function setDirection(x,y){

    if(x === -dir.x && y === -dir.y) return;

    nextDir={x,y};
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowUp" || e.key==="w") setDirection(0,-1);
    if(e.key==="ArrowDown" || e.key==="s") setDirection(0,1);
    if(e.key==="ArrowLeft" || e.key==="a") setDirection(-1,0);
    if(e.key==="ArrowRight" || e.key==="d") setDirection(1,0);

});

document.getElementById("up").ontouchstart=()=>setDirection(0,-1);
document.getElementById("down").ontouchstart=()=>setDirection(0,1);
document.getElementById("left").ontouchstart=()=>setDirection(-1,0);
document.getElementById("right").ontouchstart=()=>setDirection(1,0);

function endGame(win=false){

    running=false;
    clearInterval(gameLoop);

    if(score>best){
        best=score;
        localStorage.setItem("snake_best", best);
        bestEl.textContent=best;
    }

    document.getElementById("endScreen").style.display="flex";

    if(win){
        document.getElementById("endTitle").textContent="YOU WIN!";
        document.getElementById("endText").textContent=
            "你成功成為像素蛇王！";
    }else{
        document.getElementById("endTitle").textContent="GAME OVER";
        document.getElementById("endText").textContent=
            "你的分數：" + score;
    }
}

function update(){

    dir = nextDir;

    const head = {
        x: snake[0].x + dir.x,
        y: snake[0].y + dir.y
    };

    // 撞牆
    if(
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tile ||
        head.y >= 28
    ){
        endGame();
        return;
    }

    // 撞自己
    for(let s of snake){
        if(s.x===head.x && s.y===head.y){
            endGame();
            return;
        }
    }

    // 撞障礙
    for(let o of obstacles){
        if(o.x===head.x && o.y===head.y){
            endGame();
            return;
        }
    }

    snake.unshift(head);

    // 普通果實
    if(head.x===food.x && head.y===food.y){

        score++;
        scoreEl.textContent=score;
        createFood();

        canvas.classList.add("flash");
        setTimeout(()=>canvas.classList.remove("flash"),120);

        // 微加速
        if(speed>70){
            speed-=4;
            clearInterval(gameLoop);
            gameLoop=setInterval(update, speed);
        }

    }else if(head.x===boostFood.x && head.y===boostFood.y){

        score+=3;
        scoreEl.textContent=score;

        createBoostFood();

        speed=Math.max(50,speed-10);

        clearInterval(gameLoop);
        gameLoop=setInterval(update, speed);

    }else{
        snake.pop();
    }

    // 勝利
    if(snake.length >= 22){
        endGame(true);
        return;
    }

    draw();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 障礙
    for(let o of obstacles){

        ctx.fillStyle="#ff3366";
        ctx.fillRect(
            o.x*grid+2,
            o.y*grid+2,
            grid-4,
            grid-4
        );
    }

    // 普通果實
    ctx.fillStyle="#00ffd5";
    ctx.fillRect(
        food.x*grid+4,
        food.y*grid+4,
        grid-8,
        grid-8
    );

    // 特殊果實
    ctx.fillStyle="#ffe600";
    ctx.fillRect(
        boostFood.x*grid+3,
        boostFood.y*grid+3,
        grid-6,
        grid-6
    );

    // 蛇
    snake.forEach((s,i)=>{

        if(i===0){
            ctx.fillStyle="#ffffff";
        }else{
            ctx.fillStyle="#00aaff";
        }

        ctx.fillRect(
            s.x*grid+2,
            s.y*grid+2,
            grid-4,
            grid-4
        );

        // 像素發光
        ctx.shadowColor="#00ffd5";
        ctx.shadowBlur=10;
    });

    ctx.shadowBlur=0;
}

draw();
</script>

</body>
</html>
