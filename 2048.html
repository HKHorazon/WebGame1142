<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>2048 水墨風</title>
<style>
    body {
        margin: 0;
        font-family: "Arial", sans-serif;
        background: radial-gradient(circle at top, #f5f2e8, #d8d2c4);
        overflow: hidden;
        touch-action: none;
    }

    /* 水墨背景效果 */
    body::before {
        content: "";
        position: fixed;
        top: -50px;
        left: -50px;
        right: -50px;
        bottom: -50px;
        background: url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Ink_wash_painting_texture.jpg");
        background-size: cover;
        opacity: 0.15;
        filter: blur(2px);
        z-index: -1;
    }

    h1 {
        text-align: center;
        margin: 10px 0;
        color: #3b3b3b;
        letter-spacing: 2px;
    }

    #gameContainer {
        width: 92vw;
        max-width: 420px;
        margin: auto;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-gap: 8px;
        background: rgba(255,255,255,0.35);
        padding: 10px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        backdrop-filter: blur(6px);
    }

    .cell {
        width: 100%;
        aspect-ratio: 1;
        background: rgba(255,255,255,0.4);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        color: #333;
        transition: 0.15s;
    }

    .tile {
        animation: pop 0.2s ease;
    }

    @keyframes pop {
        from { transform: scale(0.6); opacity: 0.3; }
        to { transform: scale(1); opacity: 1; }
    }

    #info {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
        color: #444;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: #3b3b3b;
        color: white;
        font-size: 16px;
    }

    #overlay {
        position: fixed;
        top:0;
        left:0;
        right:0;
        bottom:0;
        background: rgba(0,0,0,0.6);
        display:none;
        align-items:center;
        justify-content:center;
        color:white;
        font-size:24px;
        flex-direction:column;
    }

</style>
</head>

<body>
<h1>2048 水墨風</h1>

<div id="gameContainer">
    <div id="info">
        <div>分數：<span id="score">0</span></div>
        <div>目標：2048</div>
    </div>

    <div id="board"></div>

    <button onclick="restart()">重新開始</button>
</div>

<div id="overlay">
    <div id="msg"></div>
    <button onclick="restart()">再玩一次</button>
</div>

<script>
let board = [];
let size = 4;
let score = 0;

function init() {
    board = Array.from({length: size}, () => Array(size).fill(0));
    score = 0;
    addTile();
    addTile();
    draw();
    updateScore();
    document.getElementById("overlay").style.display = "none";
}

function addTile() {
    let empty = [];
    for (let r=0;r<size;r++){
        for (let c=0;c<size;c++){
            if(board[r][c]===0) empty.push({r,c});
        }
    }
    if(empty.length===0) return;
    let spot = empty[Math.floor(Math.random()*empty.length)];
    board[spot.r][spot.c] = Math.random()<0.9?2:4;
}

function draw() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";

    for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
            let val = board[r][c];
            let cell = document.createElement("div");
            cell.className = "cell" + (val ? " tile" : "");
            cell.innerText = val ? val : "";
            boardDiv.appendChild(cell);
        }
    }
}

function updateScore(){
    document.getElementById("score").innerText = score;
}

function slide(row){
    let arr = row.filter(v=>v);
    for(let i=0;i<arr.length-1;i++){
        if(arr[i]===arr[i+1]){
            arr[i]*=2;
            score += arr[i];
            arr[i+1]=0;
        }
    }
    arr = arr.filter(v=>v);
    while(arr.length<size) arr.push(0);
    return arr;
}

function rotate() {
    let newBoard = Array.from({length:size},()=>Array(size).fill(0));
    for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
            newBoard[c][size-1-r]=board[r][c];
        }
    }
    board = newBoard;
}

function move(dir){
    let prev = JSON.stringify(board);

    if(dir==="left"){
        for(let r=0;r<size;r++){
            board[r]=slide(board[r]);
        }
    }
    if(dir==="right"){
        for(let r=0;r<size;r++){
            board[r]=slide(board[r].reverse()).reverse();
        }
    }
    if(dir==="up"){
        rotate();
        for(let r=0;r<size;r++){
            board[r]=slide(board[r]);
        }
        rotate(); rotate(); rotate();
    }
    if(dir==="down"){
        rotate();
        for(let r=0;r<size;r++){
            board[r]=slide(board[r].reverse()).reverse();
        }
        rotate(); rotate(); rotate();
    }

    if(JSON.stringify(board)!==prev){
        addTile();
    }

    draw();
    updateScore();
    checkGame();
}

function checkGame(){
    for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
            if(board[r][c]===2048){
                showEnd("你贏了！");
                return;
            }
        }
    }

    for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
            if(board[r][c]===0) return;
            if(c<size-1 && board[r][c]===board[r][c+1]) return;
            if(r<size-1 && board[r][c]===board[r+1][c]) return;
        }
    }
    showEnd("遊戲結束");
}

function showEnd(msg){
    document.getElementById("msg").innerText = msg;
    document.getElementById("overlay").style.display = "flex";
}

/* 鍵盤控制 */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") move("left");
    if(e.key==="ArrowRight") move("right");
    if(e.key==="ArrowUp") move("up");
    if(e.key==="ArrowDown") move("down");
});

/* 手機滑動 */
let startX, startY;
document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    if(Math.abs(dx)>Math.abs(dy)){
        if(dx>0) move("right");
        else move("left");
    }else{
        if(dy>0) move("down");
        else move("up");
    }
});

function restart(){
    init();
}

init();
</script>

</body>
</html>
